// ==========================

// 🧠 ปีบัญชี
function getFiscalYear(){
  const today = new Date();
  const month = today.getMonth() + 1;
  const year = today.getFullYear() + 543;

  if(month < 4){
    return year - 1;
  }
  return year;
}

// ==========================
// 🔥 ฟังก์ชันหลัก
// ==========================
async function addShareWithCarry(member_id, amount){

  try{

    const fiscalYear = getFiscalYear();
    console.log("ปีบัญชี:", fiscalYear);

    // 🔹 เช็คปี
    const { data: current } = await supabaseClient
      .from("member_share")
      .select("*")
      .eq("member_id", member_id)
      .eq("fiscal_year", fiscalYear)
      .maybeSingle();

    // =========================
    // 🔥 ไม่มีปี → สร้างใหม่
    // =========================
    if(!current){

      const { data: last } = await supabaseClient
        .from("member_share")
        .select("*")
        .eq("member_id", member_id)
        .order("fiscal_year", { ascending:false })
        .limit(1)
        .maybeSingle();

      const lastBalance = last?.share_balance || 0;

      await supabaseClient.from("member_share").insert({
        member_id: member_id,
        fiscal_year: fiscalYear,
        share_begin: lastBalance,
        share_buy: amount,
        share_sell: 0,
        share_balance: lastBalance + amount
      });

      console.log("✅ สร้างปีใหม่");

    }

    // =========================
    // 🔥 มีปี → update
    // =========================
    else{

      const newBuy = (current.share_buy || 0) + amount;

      const newBalance =
        (current.share_begin || 0) +
        newBuy -
        (current.share_sell || 0);

      await supabaseClient
        .from("member_share")
        .update({
          share_buy: newBuy,
          share_balance: newBalance
        })
        .eq("id", current.id);

      console.log("✅ อัปเดตปีเดิม");
    }

    alert("เพิ่มหุ้นสำเร็จ");

  }catch(err){
    console.error(err);
    alert(err.message);
  }
}

// ==========================
// 🔥 ปุ่มเรียกใช้
// ==========================
function handleAddShare(){
  const member_id = document.getElementById("member_id").value;
  const amount = Number(document.getElementById("amount").value);

  addShareWithCarry(member_id, amount);
}
