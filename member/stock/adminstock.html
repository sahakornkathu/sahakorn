<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMIN SHARE</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: sans-serif; background:#f8dda4; }
    input { border:1px solid #ccc; padding:10px; width:100%; margin-bottom:10px; }
    button { background:#06c755; color:white; padding:12px; width:100%; border:none; }
  </style>
</head>

<body>

<div style="max-width:400px;margin:auto;padding:20px">
  <h2 style="font-size:20px;font-weight:bold">🔥 เพิ่มหุ้น (ยกยอดอัตโนมัติ)</h2>

  <input id="member_id" placeholder="member_id">
  <input id="amount" type="number" placeholder="จำนวนหุ้น">

  <button onclick="handleAddShare()">เพิ่มหุ้น</button>
</div>

<script type="module">

// ==========================
// 🔥 INIT SUPABASE
// ==========================
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://ttottijljxoinptmhgtu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"
);

// ==========================
// 🔥 ปีบัญชี
// ==========================
function getFiscalYear(){
  const today = new Date();
  const m = today.getMonth() + 1;
  const y = today.getFullYear() + 543;
  return (m < 4) ? y - 1 : y;
}

// ==========================
// 🔥 ฟังก์ชันหลัก (UPSERT ONLY)
// ==========================
async function addShareWithCarry(member_id, amount){

  console.log("🔥 USING UPSERT");

  const fiscalYear = getFiscalYear();

  // 🔹 ปีล่าสุด
  const { data: last } = await supabaseClient
    .from("member_share")
    .select("*")
    .eq("member_id", member_id)
    .order("fiscal_year", { ascending:false })
    .limit(1)
    .maybeSingle();

  const lastBalance = last?.share_balance || 0;

  // 🔹 ปีปัจจุบัน
  const { data: current } = await supabaseClient
    .from("member_share")
    .select("*")
    .eq("member_id", member_id)
    .eq("fiscal_year", fiscalYear)
    .maybeSingle();

  let share_begin = lastBalance;
  let share_buy = amount;
  let share_sell = 0;
  let share_balance = lastBalance + amount;

  if(current){
    share_begin = current.share_begin || 0;
    share_buy = (current.share_buy || 0) + amount;
    share_sell = current.share_sell || 0;

    share_balance =
      share_begin +
      share_buy -
      share_sell;
  }

  // 🔥 UPSERT (ไม่มี 409)
  const { error } = await supabaseClient
    .from("member_share")
    .upsert({
      member_id: member_id,
      fiscal_year: fiscalYear,
      share_begin,
      share_buy,
      share_sell,
      share_balance
    },{
      onConflict: "member_id,fiscal_year"
    });

  if(error){
    console.error(error);
    alert("❌ " + error.message);
    return;
  }

  alert("✅ เพิ่มหุ้นสำเร็จ");
}

// ==========================
// 🔥 FIX SCOPE (สำคัญมาก)
// ==========================
window.addShareWithCarry = addShareWithCarry;

window.handleAddShare = function(){
  const member_id = document.getElementById("member_id").value.trim();
  const amount = Number(document.getElementById("amount").value);

  if(!member_id || !amount){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  addShareWithCarry(member_id, amount);
};

// ==========================
console.log("🚀 READY");

</script>

</body>
</html>
