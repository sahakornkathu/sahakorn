<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>อัปโหลดสลิป</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-xl font-bold mb-4">📤 อัปโหลดสลิป</h1>
<div id="orderList" class="space-y-4"></div>

<script>
const LIFF_ID = "1660910795-7r8eqok6";
const SUPABASE_URL = "https://ttottijljxoinptmhgtu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"; // 🔥 แนะนำให้ซ่อน key

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userId = null;

async function init() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadOrders();
}

// 📦 โหลดข้อมูล
async function loadOrders() {
  // 1. โหลด order
  const { data: orders, error } = await sb
    .from('historycart')
    .select('*')
    .eq('user_id', userId)
    .eq('status', 'processing')
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    alert("โหลด order ไม่สำเร็จ");
    return;
  }

  // 2. โหลด members
  const { data: members, error: memberError } = await sb
    .from('members')
    .select('member_id, line_user_id, first_name, last_name, "group"')

  if (memberError) {
    console.error(memberError);
    alert("โหลด member ไม่สำเร็จ");
    return;
  }

  // 3. map ให้เป็น members (มี s ตามที่คุณต้องการ)
  const merged = orders.map(order => {
    const m = members.find(x =>
      String(x.line_user_id).trim() === String(order.user_id).trim()
    );

    return {
      ...order,
      members: m || {}   // 👈 ใช้ members (มี s)
    };
  });

  renderOrders(merged);
}

// 🎨 render
function renderOrders(orders) {
  const container = document.getElementById('orderList');
  container.innerHTML = '';

  if (!orders.length) {
    container.innerHTML = `<div class="text-center text-gray-500">ไม่มีรายการค้างชำระ</div>`;
    return;
  }

  orders.forEach(order => {

    const isUploaded = order.slip_url && order.slip_url !== '';

    const div = document.createElement('div');
    div.className = "bg-white p-4 rounded-xl shadow";

   div.innerHTML = `
  <div class="font-bold text-lg">ออเดอร์ #${order.id}</div>

  <div class="text-sm mt-2">
    👤 ${order.members?.first_name || '-'} ${order.members?.last_name || ''}
  </div>

  <div class="text-sm text-gray-600">
    🆔 รหัสสมาชิก: ${order.members?.member_id || '-'}
  </div>

  <div class="text-sm text-gray-600">
    🏷 กลุ่ม: ${order.members?.group || '-'}
  </div>

  <div class="text-sm text-gray-600">
    💰 ยอด: ${order.total_price} บาท
  </div>

  ${
    isUploaded
    ? `<div class="mt-3 text-green-600 font-bold">✅ ส่งสลิปแล้ว</div>`
    : `
      <input type="file" accept="image/*" class="mt-3" id="file-${order.id}">
      <button 
        onclick="uploadSlip(${order.id})"
        class="mt-3 w-full bg-green-500 text-white py-2 rounded-lg">
        📤 ส่งสลิป
      </button>
    `
  }
`;

    container.appendChild(div);
  });
}

// 📤 upload
async function uploadSlip(orderId) {
  const input = document.getElementById(`file-${orderId}`);
  const file = input.files[0];

  if (!file) {
    alert("กรุณาเลือกไฟล์");
    return;
  }

  // 🔒 เช็คซ้ำ
  const { data: checkOrder } = await sb
    .from('historycart')
    .select('slip_url')
    .eq('id', orderId)
    .single();

  if (checkOrder?.slip_url) {
    alert("❌ ออเดอร์นี้ส่งสลิปไปแล้ว");
    loadOrders();
    return;
  }

  const filePath = `slips/${orderId}-${Date.now()}.jpg`;

  // upload
  const { error: uploadError } = await sb.storage
    .from('slips')
    .upload(filePath, file);

  if (uploadError) {
    console.error(uploadError);
    alert("อัปโหลดไม่สำเร็จ");
    return;
  }

  const { data } = sb.storage
    .from('slips')
    .getPublicUrl(filePath);

  const slipUrl = data.publicUrl;

  // update
  const { error: updateError } = await sb
    .from('historycart')
    .update({
      slip_url: slipUrl,
      status: 'waiting_verify'
    })
    .eq('id', orderId)
    .is('slip_url', null);

  if (updateError) {
    console.error(updateError);
    alert("บันทึกไม่สำเร็จ หรือส่งซ้ำ");
    return;
  }

  alert("✅ ส่งสลิปเรียบร้อย");
  loadOrders();
}

init();
</script>

</body>
</html>
