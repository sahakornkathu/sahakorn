<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>อัปโหลดสลิป</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://static.line-scdn.net/liff/edge/versions/2.28.0/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
.card { transition: all 0.2s ease; }
.card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
</style>
</head>

<body class="bg-gradient-to-br from-green-50 to-gray-100 min-h-screen p-4">

<h1 class="text-2xl font-bold mb-6 text-center">📤 อัปโหลดสลิป</h1>
<div id="orderList" class="space-y-4 max-w-md mx-auto"></div>

<script>
const LIFF_ID = "2009600896-Xm88XP40";

const SUPABASE_URL = "https://ttottijljxoinptmhgtu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userId = null;
let isSubmitting = false;

// ================= INIT =================
const LINE_ADD_FRIEND_URL = "https://line.me/R/ti/p/@YOUR_LINE_ID";

async function initLIFF() {
  try {

    await liff.init({
      liffId: LIFF_ID,
      withLoginOnExternalBrowser: true
    });

    // ❗ บังคับเปิดใน LINE
    if (!liff.isInClient()) {
      alert("กรุณาเปิดผ่าน LINE เท่านั้น");
      liff.openWindow({
        url: window.location.href,
        external: false
      });
      return;
    }

    // 🔐 Login
    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: window.location.href });
      return;
    }

    // 👤 profile
    const profile = await liff.getProfile();
    console.log("USER:", profile.userId);

    // ❤️ friend + unblock
    await handleFriendship();

    // 👉 ทำงานต่อ
    startApp(profile);

  } catch (err) {
    console.error("LIFF ERROR:", err);
    alert("เกิดข้อผิดพลาด: " + err.message);
  }
}

// ================= FRIENDSHIP =================
async function handleFriendship() {
  try {
    const friendship = await liff.getFriendship();

    if (!friendship.friendFlag) {
      await liff.requestFriendship();
    }

  } catch (e) {
    console.log("Friendship error:", e);
  }
}

// ================= LOAD =================
async function loadOrders() {
  const { data: orders, error } = await sb
    .from('historycart')
    .select('*')
    .eq('status', 'processing')
    .order('created_at', { ascending: false });

  if (error) {
    Swal.fire("ผิดพลาด", "โหลดข้อมูลไม่ได้", "error");
    return;
  }

  const { data: members } = await sb
    .from('members')
    .select('member_id, line_user_id, first_name, last_name, "group"');

  const merged = orders.map(order => {
    const m = members.find(x => x.line_user_id === order.user_id);
    return { ...order, members: m || {} };
  });

  renderOrders(merged);
}

// ================= RENDER =================
function renderOrders(orders) {
  const container = document.getElementById('orderList');
  container.innerHTML = '';

  if (!orders.length) {
    container.innerHTML = `<div class="text-center text-gray-400">ไม่มีรายการ</div>`;
    return;
  }

  orders.forEach(order => {
    const isUploaded = order.slip_url;

    const div = document.createElement('div');
    div.className = "card bg-white p-5 rounded-2xl shadow";

    div.innerHTML = `
      <div class="flex justify-between items-center mb-2">
        <div class="font-bold text-lg">#${order.id}</div>
        <div class="text-green-600 font-semibold">${order.total_price}฿</div>
      </div>

      <div class="text-sm text-gray-600">
        👤 ${order.members?.first_name || '-'} ${order.members?.last_name || ''}
      </div>

      <div class="text-sm text-gray-500">
        🆔 ${order.members?.member_id || '-'} | 🏷 ${order.members?.group || '-'}
      </div>

      ${
        isUploaded
        ? `<div class="mt-3 text-green-600 font-bold">✅ ส่งแล้ว</div>`
        : `
          <input type="file" accept="image/*" class="mt-3 block w-full text-sm" id="file-${order.id}">
          <button onclick="uploadSlip(${order.id}, this)"
            class="mt-3 w-full bg-green-500 hover:bg-green-600 text-white py-2 rounded-xl transition">
            📤 ส่งสลิป
          </button>
        `
      }
    `;

    container.appendChild(div);
  });
}

// ================= UPLOAD =================
async function uploadSlip(orderId, btn) {

  if (isSubmitting) return;
  isSubmitting = true;

  btn.disabled = true;
  btn.innerText = "กำลังส่ง...";

  const input = document.getElementById(`file-${orderId}`);
  const file = input.files[0];

  if (!file) {
    Swal.fire("แจ้งเตือน", "กรุณาเลือกไฟล์", "warning");
    resetBtn(btn);
    return;
  }

  Swal.fire({
    title: 'กำลังอัปโหลด...',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });

  try {
    const filePath = `slips/${orderId}-${Date.now()}.jpg`;

    const { error: uploadError } = await sb.storage
      .from('slips')
      .upload(filePath, file);

    if (uploadError) throw uploadError;

    const { data } = sb.storage
      .from('slips')
      .getPublicUrl(filePath);

    const slipUrl = data.publicUrl;

    const { error: updateError } = await sb
      .from('historycart')
      .update({
        slip_url: slipUrl,
        status: 'waiting_verify'
      })
      .eq('id', orderId);

    if (updateError) throw updateError;

    // ยิง API
    await fetch("https://ttottijljxoinptmhgtu.supabase.co/functions/v1/send-slip-confirm", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        userId,
        orderId,
        slipUrl
      })
    });

    Swal.fire({
      icon: 'success',
      title: 'ส่งสำเร็จ 🎉',
      timer: 1500,
      showConfirmButton: false
    }).then(() => {
      liff.closeWindow();
    });

  } catch (err) {
    console.error(err);
    Swal.fire("ผิดพลาด", "เกิดข้อผิดพลาด", "error");
    resetBtn(btn);
  }
}

// ================= RESET =================
function resetBtn(btn) {
  isSubmitting = false;
  btn.disabled = false;
  btn.innerText = "📤 ส่งสลิป";
}

init();
</script>

</body>
</html>
