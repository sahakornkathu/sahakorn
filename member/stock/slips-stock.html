<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>อัปโหลดสลิป</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-xl font-bold mb-4">📤 อัปโหลดสลิป</h1>
<div id="orderList" class="space-y-4"></div>

<script>
const LIFF_ID = "1660910795-7r8eqok6";
const SUPABASE_URL = "https://ttottijljxoinptmhgtu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userId = null;

async function init() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadOrders();
}

// 📦 โหลดเฉพาะของตัวเอง + processing
async function loadOrders() {
  const { data, error } = await supabase
    .from('historycart')
    .select('*')
    .eq('user_id', userId)
    .eq('status', 'processing')
    .order('created_at', { ascending: false });

  if (error) {
    alert("โหลดข้อมูลไม่สำเร็จ");
    console.error(error);
    return;
  }

  renderOrders(data);
}

// 🎨 แสดงผล
function renderOrders(orders) {
  const container = document.getElementById('orderList');
  container.innerHTML = '';

  if (!orders.length) {
    container.innerHTML = `<div class="text-center text-gray-500">ไม่มีรายการค้างชำระ</div>`;
    return;
  }

  orders.forEach(order => {

    // 🔒 กันส่งซ้ำ
    const isUploaded = order.slip_url && order.slip_url !== '';

    const div = document.createElement('div');
    div.className = "bg-white p-4 rounded-xl shadow";

    div.innerHTML = `
      <div class="font-bold text-lg">ออเดอร์ #${order.id}</div>

      <div class="text-sm mt-2">
        👤 ${order.first_name || '-'} ${order.last_name || ''}
      </div>

      <div class="text-sm text-gray-600">
        🏷 กลุ่ม: ${order.group || '-'}
      </div>

      <div class="text-sm text-gray-600">
        💰 ยอด: ${order.total_price} บาท
      </div>

      ${
        isUploaded
        ? `<div class="mt-3 text-green-600 font-bold">✅ ส่งสลิปแล้ว</div>`
        : `
          <input type="file" accept="image/*" class="mt-3" id="file-${order.id}">
          <button 
            onclick="uploadSlip(${order.id})"
            class="mt-3 w-full bg-green-500 text-white py-2 rounded-lg">
            📤 ส่งสลิป
          </button>
        `
      }
    `;

    container.appendChild(div);
  });
}

// 📤 อัปโหลด
async function uploadSlip(orderId) {
  const input = document.getElementById(`file-${orderId}`);
  const file = input.files[0];

  if (!file) {
    alert("กรุณาเลือกไฟล์");
    return;
  }

  // 🔥 เช็คซ้ำก่อน (กันยิง API ซ้ำ)
  const { data: checkOrder } = await supabase
    .from('historycart')
    .select('slip_url')
    .eq('id', orderId)
    .single();

  if (checkOrder.slip_url) {
    alert("❌ ออเดอร์นี้ส่งสลิปไปแล้ว");
    loadOrders();
    return;
  }

  const filePath = `slips/${orderId}-${Date.now()}.jpg`;

  // upload
  const { error: uploadError } = await supabase.storage
    .from('slips')
    .upload(filePath, file);

  if (uploadError) {
    alert("อัปโหลดไม่สำเร็จ");
    console.error(uploadError);
    return;
  }

  const { data } = supabase.storage
    .from('slips')
    .getPublicUrl(filePath);

  const slipUrl = data.publicUrl;

  // update + กัน race condition
  const { error: updateError } = await supabase
    .from('historycart')
    .update({
      slip_url: slipUrl,
      status: 'waiting_verify'
    })
    .eq('id', orderId)
    .is('slip_url', null); // 🔥 กันส่งซ้ำระดับ DB

  if (updateError) {
    alert("บันทึกไม่สำเร็จ หรือมีการส่งซ้ำ");
    console.error(updateError);
    return;
  }

  alert("✅ ส่งสลิปเรียบร้อย");
  loadOrders();
}

init();
</script>

</body>
</html>
