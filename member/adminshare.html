<!DOCTYPE html>

<html lang="th">
<head>

<meta charset="UTF-8">
<title>ซื้อขายหุ้นสหกรณ์</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#eef2f7;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

/* card */

.card{
background:white;
padding:22px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-bottom:18px;
}

/* title */

h3{
margin-top:0;
margin-bottom:12px;
font-size:18px;
}

/* label */

label{
font-weight:600;
font-size:14px;
display:block;
margin-bottom:4px;
}

/* input */

input,select{
width:100%;
padding:11px;
border-radius:8px;
border:1px solid #d5d9e0;
font-size:15px;
margin-bottom:12px;
box-sizing:border-box;
}

input:focus{
outline:none;
border-color:#06c755;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
background:#06c755;
color:white;
font-weight:600;
}

button:hover{
background:#05b24b;
}

/* row */

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

.row:last-child{
border-bottom:none;
}

/* table header */

.header{
font-weight:700;
background:#f3f5f9;
padding:10px 6px;
border-radius:6px;
margin-bottom:4px;
}

/* fiscal year title */

h4{
margin-top:20px;
margin-bottom:6px;
color:#06c755;
}

/* summary */

.summary{
font-weight:600;
background:#fafafa;
}

.daily-table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:14px;
}

.daily-table th{
background:#f3f5f9;
padding:10px;
text-align:center;
font-weight:700;
border-bottom:2px solid #e5e7eb;
}

.daily-table td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.daily-table tr:hover{
background:#f9fafb;
}

.daily-total{
font-weight:700;
background:#f3f5f9;
}
  
</style>

</head>

<body>

<div class="container">

<div class="card">

<h3>ค้นหาสมาชิก</h3>

<label>เลขสมาชิก</label> <input id="member_id">

<button onclick="loadMember()">โหลดข้อมูล</button>

</div>

<div id="memberBox"></div>

<div id="formBox"></div>

<div class="card">

<label>ค้นหาปีบัญชี</label>

<select id="yearFilter" onchange="loadReport()">
<option value="all">ทุกปี</option>
</select>

</div>
  
<div id="reportBox"></div>
  
<div class="card">

<h3>รายงานซื้อหุ้นประจำวัน</h3>

<label>เลือกวันที่</label>
<input type="date" id="dailyDate" onchange="loadDailyReport()">

<div id="dailyReport"></div>

</div>
  
</div>

<script>

const sb = window.supabase.createClient(
"https://ttottijljxoinptmhgtu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"
)

let member=null

/* แปลง พ.ศ → ISO */

function thaiToISO(date){

const p=date.split("/")
const day=p[0]
const month=p[1]
const year=p[2]-543

return `${year}-${month}-${day}`

}

/* ISO → พ.ศ */

function isoToThai(date){

const d=new Date(date)

const day=String(d.getDate()).padStart(2,"0")
const month=String(d.getMonth()+1).padStart(2,"0")
const year=d.getFullYear()+543

return `${day}/${month}/${year}`

}

/* วันที่วันนี้ */

function getTodayThai(){

const d=new Date()

const day=String(d.getDate()).padStart(2,"0")
const month=String(d.getMonth()+1).padStart(2,"0")
const year=d.getFullYear()+543

return `${day}/${month}/${year}`

}

/* คำนวณปีบัญชี */

function getFiscalYear(iso){

const d=new Date(iso)

const month=d.getMonth()+1
const year=d.getFullYear()+543

if(month>=4){

return year

}else{

return year-1

}

}

/* โหลดสมาชิก */

async function loadMember(){

const id=document.getElementById("member_id").value

const {data}=await sb
.from("members")
.select("*")
.eq("member_id",id)
.maybeSingle()

if(!data){

Swal.fire({
icon:'error',
title:'ไม่พบสมาชิก'
})
return

}

member=data

document.getElementById("memberBox").innerHTML=`

<div class="card">

<h3>ข้อมูลสมาชิก</h3>

<div class="row">
<span>รหัสสมาชิก</span>
<span>${data.member_id}</span>
</div>

<div class="row">
<span>ชื่อ</span>
<span>${data.first_name} ${data.last_name}</span>
</div>

</div>

`

showForm()
loadYearFilter()
loadReport()

}

async function loadDailyReport(){

const date=document.getElementById("dailyDate").value

const {data,error}=await sb
.from("member_share_tx")
.select(`
member_id,
share_buy,
members(first_name,last_name,group)
`)
.eq("trans_date",date)

if(error){
console.log(error)
return
}

if(!data || data.length===0){
document.getElementById("dailyReport").innerHTML="ไม่มีรายการ"
return
}

let total=0

let html=`
<table class="daily-table">

<thead>
<tr>
<th>รหัส</th>
<th>ชื่อ</th>
<th>กลุ่ม</th>
<th>ซื้อ</th>
</tr>
</thead>
<tbody>
`

data.forEach(r=>{

total+=Number(r.share_buy)

html+=`
<tr>
<td>${r.member_id}</td>
<td>${r.members.first_name} ${r.members.last_name}</td>
<td>${r.members.group ?? "-"}</td>
<td>${r.share_buy}</td>
</tr>
`

})

html+=`
<tr class="daily-total">
<td colspan="3">รวม</td>
<td>${total}</td>
</tr>
</tbody>
</table>
`

document.getElementById("dailyReport").innerHTML=html

}
  
async function loadYearFilter(){

const {data,error}=await sb
.from("member_share_tx")
.select("fiscal_year")
.eq("member_id", Number(member.member_id))

if(error){
console.log(error)
return
}

if(!data || data.length===0){

document.getElementById("yearFilter").innerHTML=
'<option value="all">ทุกปี</option>'

return
}

/* เอาปีบัญชีไม่ซ้ำ */

const years=[...new Set(data.map(r=>r.fiscal_year))]

years.sort((a,b)=>b-a)

let html='<option value="all">ทุกปี</option>'

years.forEach(y=>{
html+=`<option value="${y}">${y}</option>`
})

document.getElementById("yearFilter").innerHTML=html

}
/* ฟอร์ม */

function showForm(){

document.getElementById("formBox").innerHTML=`

<div class="card">

<h3>บันทึกซื้อ / ขายหุ้น</h3>

<label>วันที่ (พ.ศ.)</label>
<input id="date" value="${getTodayThai()}">

<label>ซื้อหุ้น</label>
<input id="buy">

<label>ขายหุ้น</label>
<input id="sell">

<button onclick="saveShare()">บันทึก</button>

</div>

`

}

/* บันทึก */

async function saveShare(){

const date=document.getElementById("date").value
const buy=Number(document.getElementById("buy").value||0)
const sell=Number(document.getElementById("sell").value||0)

const iso=thaiToISO(date)
const fiscal=getFiscalYear(iso)

/* บันทึก transaction */

await sb
.from("member_share_tx")
.insert({
member_id: Number(member.member_id),
trans_date:iso,
fiscal_year:fiscal,
share_buy:buy,
share_sell:sell

})

/* ตรวจ summary */

const {data}=await sb
.from("member_share")
.select("*")
.eq("member_id", Number(member.member_id))
.eq("fiscal_year",fiscal)
.maybeSingle()

if(data){

/* update ปีเดิม */

const newBuy=data.share_buy+buy
const newSell=data.share_sell+sell

const balance=data.share_begin + newBuy - newSell

await sb
.from("member_share")
.update({

share_buy:newBuy,
share_sell:newSell,
share_balance:balance

})
.eq("id",data.id)

}else{

/* หา balance ปีที่แล้ว */

const lastYear=fiscal-1

const {data:last}=await sb
.from("member_share")
.select("share_balance")
.eq("member_id", Number(member.member_id))
.eq("fiscal_year",lastYear)
.maybeSingle()

let begin=0

if(last){

begin=last.share_balance

}

/* insert ปีใหม่ */

const newBuy=buy
const newSell=sell

const balance=begin + newBuy - newSell

await sb
.from("member_share")
.insert({

member_id:member.member_id,
fiscal_year:fiscal,
share_begin:begin,
share_buy:newBuy,
share_sell:newSell,
share_balance:balance

})

}

Swal.fire({
icon: 'success',
title: 'บันทึกสำเร็จ',
text: 'ข้อมูลหุ้นถูกบันทึกแล้ว',
timer: 1500,
showConfirmButton: false
})
/* เคลียร์ช่อง input */
document.getElementById("buy").value=""
document.getElementById("sell").value=""

/* โฟกัสกลับไปที่ช่องซื้อ */
document.getElementById("buy").focus()
loadReport()

}

/* โหลดรายงาน */

async function loadReport(){

let query=sb
.from("member_share_tx")
.select("*")
.eq("member_id", Number(member.member_id))

const year=document.getElementById("yearFilter")?.value

if(year && year!=="all"){

query=query.eq("fiscal_year", Number(year))

}

const {data}=await query
.order("fiscal_year",{ascending:false})
.order("trans_date",{ascending:true})

let html=`<div class="card"><h3>รายงานซื้อขายหุ้น</h3>`

let currentYear=null
let totalBuy=0
let totalSell=0

data?.forEach(r=>{

if(currentYear!==r.fiscal_year){

if(currentYear!==null){

html+=`
<div class="row header">
<span>รวมซื้อ ${totalBuy}</span>
<span>รวมขาย ${totalSell}</span>
</div>
<div class="row">
<span>คงเหลือ</span>
<span>${totalBuy-totalSell}</span>
</div>
<br>
`

}

currentYear=r.fiscal_year
totalBuy=0
totalSell=0

html+=`

<h4>ปีบัญชี ${currentYear}</h4>

<div class="row header">
<span>วันที่</span>
<span>ซื้อหุ้น</span>
<span>ขายหุ้น</span>
</div>

`

}

totalBuy+=Number(r.share_buy)
totalSell+=Number(r.share_sell)

html+=`

<div class="row">
<span>${isoToThai(r.trans_date)}</span>
<span>${r.share_buy}</span>
<span>${r.share_sell}</span>
<span>
<button onclick="deleteTx(${r.id})"
style="background:red;color:white;padding:4px 8px;border:none;border-radius:6px">
ลบ
</button>
</span>
</div>
`

})

html+=`

<div class="row summary">
<span>รวมซื้อ</span>
<span>${totalBuy}</span>
</div>

<div class="row summary">
<span>รวมขาย</span>
<span>${totalSell}</span>
</div>

<div class="row">
<span>คงเหลือ</span>
<span>${totalBuy-totalSell}</span>
</div>

</div>

`

document.getElementById("reportBox").innerHTML=html

}

document.getElementById("dailyDate").value =
new Date().toISOString().split("T")[0]
// 🔥 เพิ่มบรรทัดนี้
loadDailyReport();
async function deleteTx(id){

const confirm = await Swal.fire({
  title: 'ยืนยันลบรายการ?',
  text: 'ลบแล้วแก้ไขไม่ได้',
  icon: 'warning',
  showCancelButton: true,
  confirmButtonText: 'ลบ',
  cancelButtonText: 'ยกเลิก'
})

if(!confirm.isConfirmed) return

// 🔥 ดึงข้อมูลก่อนลบ
const { data: tx } = await sb
  .from("member_share_tx")
  .select("*")
  .eq("id", id)
  .single()

if(!tx) return

// 🔥 ลบรายการ
await sb
  .from("member_share_tx")
  .delete()
  .eq("id", id)

// 🔥 คำนวณใหม่
await recalcShare(tx.member_id, tx.fiscal_year)

Swal.fire({
  icon: 'success',
  title: 'ลบสำเร็จ',
  timer: 1200,
  showConfirmButton: false
})

loadReport()
}

async function recalcShare(member_id, fiscal){

// 🔥 ดึง transaction ทั้งปี
const { data } = await sb
  .from("member_share_tx")
  .select("*")
  .eq("member_id", member_id)
  .eq("fiscal_year", fiscal)

let totalBuy = 0
let totalSell = 0

data?.forEach(r=>{
  totalBuy += Number(r.share_buy)
  totalSell += Number(r.share_sell)
})

// 🔥 หา share_begin
const lastYear = fiscal - 1

const { data: last } = await sb
  .from("member_share")
  .select("share_balance")
  .eq("member_id", member_id)
  .eq("fiscal_year", lastYear)
  .maybeSingle()

let begin = last?.share_balance || 0

const balance = begin + totalBuy - totalSell

// 🔥 update summary
await sb
  .from("member_share")
  .update({
    share_buy: totalBuy,
    share_sell: totalSell,
    share_balance: balance
  })
  .eq("member_id", member_id)
  .eq("fiscal_year", fiscal)

}
</script>

</body>
</html>
