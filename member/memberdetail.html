<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Member Profile</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:sans-serif;
background:#f3f4f6;
padding:30px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.profile{
text-align:center;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
}

.name{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.row{
margin-bottom:10px;
}

.label{
font-weight:bold;
color:#555;
}

input{
width:100%;
padding:8px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:10px;
padding:10px 14px;
border:none;
background:#06c755;
color:white;
border-radius:8px;
cursor:pointer;
}

.error{
color:red;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="card profile">

<img id="linePic">

<div class="name" id="lineName">Loading...</div>

</div>

<div id="memberData"></div>

</div>

<script>

const LIFF_ID = "1660910795-ZwhoBm8e"

const sb = window.supabase.createClient(
"https://ttottijljxoinptmhgtu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"
)

let memberId = null

async function init(){

await liff.init({ liffId: LIFF_ID })

if(!liff.isLoggedIn()){
liff.login()
return
}

const profile = await liff.getProfile()

document.getElementById("linePic").src = profile.pictureUrl
document.getElementById("lineName").innerText = profile.displayName

loadMember(profile.userId)

}

async function loadMember(userId){

const { data } = await sb
.from("members")
.select("*")
.eq("line_user_id", userId)

if(!data || data.length === 0){

showError("ไม่พบสมาชิก")

return
}

renderMember(data[0])

}

function renderMember(m){

memberId = m.member_id

document.getElementById("memberData").innerHTML = `

<div class="card">

<div class="row">

<span class="label">ชื่อ</span>

<input id="first_name" value="${m.first_name}">

</div>

<div class="row">

<span class="label">นามสกุล</span>

<input id="last_name" value="${m.last_name}">

</div>

<div class="row">

<span class="label">เบอร์โทร</span>

<input id="phone" value="${m.phone ?? ""}">

</div>

<div class="row">

<span class="label">บ้านเลขที่</span>

<input id="house_no" value="${m.house_no ?? ""}">

</div>

<div class="row">

<span class="label">หมู่</span>

<input id="moo" value="${m.moo ?? ""}">

</div>

<div class="row">

<span class="label">ตำบล</span>

<input id="subdistrict" value="${m.subdistrict ?? ""}">

</div>

<div class="row">

<span class="label">อำเภอ</span>

<input id="district" value="${m.district ?? ""}">

</div>

<div class="row">

<span class="label">จังหวัด</span>

<input id="province" value="${m.province ?? ""}">

</div>

<button onclick="saveMember()">บันทึกข้อมูล</button>

</div>
`

}

async function saveMember(){

await sb
.from("members")
.update({

first_name:document.getElementById("first_name").value,
last_name:document.getElementById("last_name").value,
phone:document.getElementById("phone").value,
house_no:document.getElementById("house_no").value,
moo:document.getElementById("moo").value,
subdistrict:document.getElementById("subdistrict").value,
district:document.getElementById("district").value,
province:document.getElementById("province").value

})
.eq("member_id", memberId)

alert("บันทึกข้อมูลสำเร็จ")

}

function showError(msg){

document.getElementById("memberData").innerHTML =
`<div class="card error">${msg}</div>`

}

init()

</script>

</body>
</html>
