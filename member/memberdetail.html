<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบสมาชิก</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:sans-serif;
background:#f3f4f6;
padding:30px;
}

.card{
max-width:520px;
margin:auto;
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.profile{
text-align:center;
margin-bottom:20px;
}

.profile img{
width:110px;
height:110px;
border-radius:50%;
}

.name{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.section{
margin-top:20px;
line-height:1.8;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
margin-top:15px;
padding:10px 15px;
border:none;
background:#06c755;
color:white;
border-radius:8px;
cursor:pointer;
}

.debug{
margin-top:20px;
background:black;
color:#0f0;
padding:10px;
font-size:12px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="card">

<div class="profile">
<img id="profilePic">
<div class="name" id="displayName"></div>
</div>

<div id="memberArea"></div>

<div class="debug" id="debug"></div>

</div>

<script>

const LIFF_ID = "2009012101-mBy1yERI"

const supabase = window.supabase.createClient(
"https://ttottijljxoinptmhgtu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"
)

let LINE_USER_ID = null

async function main(){

await liff.init({ liffId: LIFF_ID })

if(!liff.isLoggedIn()){
liff.login()
return
}

const profile = await liff.getProfile()

LINE_USER_ID = profile.userId

document.getElementById("profilePic").src = profile.pictureUrl
document.getElementById("displayName").innerText = profile.displayName

debug("LINE USER ID : "+LINE_USER_ID)

checkMember()

}

async function checkMember(){

const { data } = await supabase
.from("members")
.select("*")
.eq("line_user_id", LINE_USER_ID)

debug("MEMBER RESULT : "+JSON.stringify(data))

if(data && data.length > 0){

showMember(data[0])

}else{

showBindForm()

}

}

function showMember(m){

document.getElementById("memberArea").innerHTML = `

<div class="section">

<div><b>รหัสสมาชิก :</b> ${m.member_id}</div>
<div><b>ชื่อ :</b> ${m.title} ${m.first_name} ${m.last_name}</div>
<div><b>เลขบัตร :</b> ${m.id_card}</div>
<div><b>เบอร์โทร :</b> ${m.phone}</div>
<div><b>สถานะ :</b> ${m.member_status}</div>

</div>

`

}

function showBindForm(){

document.getElementById("memberArea").innerHTML = `

<div class="section">

<h3>ไม่พบสมาชิก</h3>

กรุณากรอกเลขบัตรประชาชนเพื่อผูก LINE

<input id="idcard" placeholder="เลขบัตรประชาชน">

<button onclick="bindMember()">ผูก LINE กับสมาชิก</button>

</div>

`

}

async function bindMember(){

const idcard = document.getElementById("idcard").value

const { data } = await supabase
.from("members")
.select("*")
.eq("id_card", idcard)

if(!data || data.length == 0){

alert("ไม่พบสมาชิก")

return

}

const member = data[0]

await supabase
.from("members")
.update({
line_user_id: LINE_USER_ID
})
.eq("id_card", idcard)

alert("ผูก LINE สำเร็จ")

checkMember()

}

function debug(msg){

const el = document.getElementById("debug")

el.innerHTML += "<br>"+msg

console.log(msg)

}

main()

</script>

</body>
</html>
