/* DATE */
function thaiDate(date){
  if(!date) return "";
  const months=[
    "มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
    "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
  ];
  const d=new Date(date);
  return d.getDate()+" "+months[d.getMonth()]+" "+(d.getFullYear()+543);
}

function calcAge(date){
  if(!date) return "";
  const birth=new Date(date);
  const today=new Date();
  let age=today.getFullYear()-birth.getFullYear();
  const m=today.getMonth()-birth.getMonth();
  if(m<0||(m===0&&today.getDate()<birth.getDate())) age--;
  return age;
}

/* THAI DATE INPUT */
function formatThaiDateInput(date){
  if(!date) return "";
  const d=new Date(date);
  const day=String(d.getDate()).padStart(2,"0");
  const month=String(d.getMonth()+1).padStart(2,"0");
  const year=d.getFullYear()+543;
  return `${day}/${month}/${year}`;
}

function convertThaiToISO(date){
  if(!date) return null;
  const parts=date.split("/");
  if(parts.length!==3) return null;
  const day=parts[0];
  const month=parts[1];
  const year=parts[2]-543;
  return `${year}-${month}-${day}`;
}

/* MEETING */
async function loadMeeting(){
  const {data}=await sb
    .from("member_meeting")
    .select("*")
    .eq("member_id",member.member_id)
    .order("fiscal_year",{ascending:false})
    .order("meeting_date",{ascending:false});

  if(!data || data.length===0){
    return "<div>ยังไม่มีข้อมูลประชุม</div>";
  }

  let html="";
  let currentYear=null;

  data.forEach(m=>{
    if(currentYear!==m.fiscal_year){
      currentYear=m.fiscal_year;
      html+=`<div style="font-weight:bold;margin-top:10px;color:#06c755;">ปีบัญชี ${currentYear}</div>`;
    }

    html+=`
      <div class="row">
        <span>${m.meeting_type}</span>
        <span>${thaiDate(m.meeting_date)}</span>
      </div>
    `;
  });

  return html;
}

/* SHARE */

  let query=sb

  if(year && year!=="all"){
    query=query.eq("fiscal_year",year);
  }

  const {data}=await query.order("fiscal_year",{ascending:false});

  if(!data || data.length===0){
    return "<div>ยังไม่มีข้อมูลหุ้น</div>";
  }

  let html="";

  data.forEach(s=>{
    html+=`

        ปีบัญชี ${s.fiscal_year}

        <span><b>${s.share_balance ?? 0}</b></span>

async function loadShareTx(){

      </div>
    `;
  });

  return html;
}

async function loadShareYears(){

  const {data}=await sb
  .from("member_share")
  .select("fiscal_year")
  .eq("member_id",member.member_id)

  if(!data || data.length===0){
    return '<option value="all">ทุกปี</option>'
  }

  const years=[...new Set(data.map(x=>x.fiscal_year))]

  years.sort((a,b)=>b-a)

  let html='<option value="all">ทุกปี</option>'

  years.forEach(y=>{
    html+=`<option value="${y}">${y}</option>`
  })

  return html
}

        <h3>🗳 ข้อมูลการเข้าร่วมประชุม</h3>
        ${meetingHTML}
      </div>
    </div>

    <div id="tab_share" class="tab-content">
      <div class="card">
        <div class="filter-box">
          <label>📅 ปีบัญชี</label>
          <select class="filter-select" id="shareYearFilter" onchange="reloadShareTx()">
            ${shareYears}
          </select>
        </div>
      </div>

      <div class="card">
        <h3>💰 หุ้นสหกรณ์</h3>
        <div id="shareSummaryBox">
          ${shareHTML}
        </div>
      </div>

      <div class="card">
        <h3>📊 รายงานซื้อขายหุ้น</h3>
        <div class="row" style="font-weight:bold">
          <span>วันที่</span>
          <span>ซื้อ</span>
          <span>ขาย</span>
        </div>
        <div id="shareTxBox">
          ${shareTxHTML}
        </div>
      </div>
    </div>
  `;
}

async function reloadShareTx(){
  const shareHTML=await loadShare();
  const txHTML=await loadShareTx();
  document.getElementById("shareSummaryBox").innerHTML=shareHTML;
  document.getElementById("shareTxBox").innerHTML=txHTML;
}

loadTheme();
init();
</script>

</body>
</html>
