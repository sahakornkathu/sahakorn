<!DOCTYPE html>

<style>

body{

margin:0;

.container{

/* PROFILE HEADER */

.header{

padding:26px 15px;

.header img{

/* ROW */

}

.row:last-child{

/* BUTTON */

button{

border-radius:10px;
padding:12px;
font-size:15px;
cursor:pointer;
}

.primary{
background:#06c755;
color:white;
width:100%;
}

.danger{
background:#ff4d4f;
color:white;
width:100%;

}

/* EDIT BUTTON */

.edit-btn{
position:absolute;
top:12px;

background:#ff9800;
color:white;
padding:8px 10px;
font-size:13px;
}

/* INPUT */

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
margin-bottom:10px;
box-sizing:border-box;
}

label{
font-weight:bold;
}

/* TAB */

.tabs{
display:flex;
background:white;
border-radius:12px;
margin-bottom:14px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.05);

.tab{

text-align:center;
padding:12px;
font-weight:600;
font-size:14px;
cursor:pointer;
color:#222;
background:#f5f5f5;
}

.tab.active{
background:#06c755;
color:#000;
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

/* DARK MODE */

.dark body{
background:#121212;
color:white;
}

.dark .card{
background:#1e1e1e;
}

.dark input{
background:#2b2b2b;
color:white;
border:1px solid #444;
}

.dark .tabs{
background:#1e1e1e;
}

.dark .tab{
background:#2a2a2a;
color:#ddd;
}

.dark .tab.active{

</style>

</head>

<body>

<div style="text-align:right;margin-bottom:10px;">
<button onclick="toggleDark()">🌙</button>
</div>

<script>

const LIFF_ID="1660910795-ZwhoBm8e"

const sb = window.supabase.createClient(
"https://ttottijljxoinptmhgtu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"
)

let userId

/* DARK MODE */

function toggleDark(){

document.documentElement.classList.toggle("dark")

if(document.documentElement.classList.contains("dark")){
localStorage.setItem("theme","dark")
}else{
localStorage.setItem("theme","light")
}

}

function loadTheme(){

if(localStorage.getItem("theme")==="dark"){
document.documentElement.classList.add("dark")
}

}

/* DATE */

function thaiDate(date){

if(!date) return ""

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

const d=new Date(date)

return d.getDate()+" "+months[d.getMonth()]+" "+(d.getFullYear()+543)

}

function calcAge(date){

if(!date) return ""

const birth=new Date(date)
const today=new Date()

let age=today.getFullYear()-birth.getFullYear()

const m=today.getMonth()-birth.getMonth()

if(m<0||(m===0&&today.getDate()<birth.getDate())) age--

return age

}

/* TAB */

function openTab(tab){

document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active")
})

document.querySelectorAll(".tab-content").forEach(c=>{
c.classList.remove("active")
})

document.getElementById("tabBtn_"+tab).classList.add("active")
document.getElementById("tab_"+tab).classList.add("active")

}

/* INIT */

async function init(){

await liff.init({liffId:LIFF_ID})

if(!liff.isLoggedIn()){
liff.login()
return
}

profile=await liff.getProfile()
userId=profile.userId

}

async function checkBind(){

.from("members")

/* THAI DATE INPUT */

function formatThaiDateInput(date){

if(!date) return ""

const d=new Date(date)

const day=String(d.getDate()).padStart(2,"0")
const month=String(d.getMonth()+1).padStart(2,"0")
const year=d.getFullYear()+543

return `${day}/${month}/${year}`

}

function convertThaiToISO(date){

if(!date) return null

const parts=date.split("/")

if(parts.length!==3) return null

const day=parts[0]
const month=parts[1]
const year=parts[2]-543

return `${year}-${month}-${day}`

}

  /* EDIT */

// SAVEMEMBER

  async function saveMember(){

.from("members")

/* MEETING */

async function loadMeeting(){

const {data}=await sb
.from("member_meeting")
.select("*")
.eq("member_id",member.member_id)
.order("fiscal_year",{ascending:false})
.order("meeting_date",{ascending:false})

if(!data || data.length===0){
return "<div>ยังไม่มีข้อมูลประชุม</div>"
}

let html=""
let currentYear=null

data.forEach(m=>{

if(currentYear!==m.fiscal_year){

currentYear=m.fiscal_year

html+=`<div style="font-weight:bold;margin-top:10px;color:#06c755;">ปีบัญชี ${currentYear}</div>`

}

html+=`
<div class="row">
<span>${m.meeting_type}</span>
<span>${thaiDate(m.meeting_date)}</span>
</div>
`

})

return html

}


/* SHARE */

async function loadShare(){

const {data}=await sb
.from("member_share")
.select("*")

.order("fiscal_year",{ascending:false})

}

let html=""
let currentYear=null

data.forEach(s=>{

if(currentYear!==s.fiscal_year){

currentYear=s.fiscal_year

html+=`
<div style="
font-weight:bold;
margin-top:10px;
margin-bottom:6px;
color:#06c755;
">
ปีบัญชี ${currentYear}
</div>
`
}

html+=`

<div class="row">
<span>ยอดยกมา</span>
<span>${s.share_begin ?? 0}</span>
</div>

<div class="row">

</div>

`

})

return html

}
