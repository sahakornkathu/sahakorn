<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Member Profile</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:sans-serif;
background:#f3f4f6;
padding:30px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.profile{
text-align:center;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
}

.name{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.row{
margin-bottom:8px;
}

.label{
font-weight:bold;
color:#555;
}

.error{
color:red;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="card profile">

<img id="linePic">

<div class="name" id="lineName">Loading...</div>

</div>

<div id="memberData"></div>

</div>

<script>

const LIFF_ID = "1660910795-ZwhoBm8e"

const sb = window.supabase.createClient(
"https://ttottijljxoinptmhgtu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"
)

async function init(){

await liff.init({ liffId: LIFF_ID })

if(!liff.isLoggedIn()){

liff.login()

return

}

const profile = await liff.getProfile()

document.getElementById("linePic").src = profile.pictureUrl
document.getElementById("lineName").innerText = profile.displayName

checkMember(profile.userId)

}

async function checkMember(userId){

const { data, error } = await sb
.from("members")
.select("*")
.eq("line_user_id", userId)

if(error){

showError("Database error")

return

}

if(!data || data.length === 0){

showError("ไม่พบสมาชิกที่ผูกกับ LINE นี้")

return

}

renderMember(data[0])

}

function renderMember(m){

document.getElementById("memberData").innerHTML =

`
<div class="card">

<div class="row"><span class="label">รหัสสมาชิก :</span> ${m.member_id}</div>

<div class="row"><span class="label">ชื่อ :</span> ${m.title} ${m.first_name} ${m.last_name}</div>

<div class="row"><span class="label">เลขบัตร :</span> ${m.id_card}</div>

<div class="row"><span class="label">วันสมัคร :</span> ${m.join_date}</div>

<div class="row"><span class="label">สถานะ :</span> ${m.member_status}</div>

<div class="row"><span class="label">เบอร์โทร :</span> ${m.phone}</div>

<div class="row"><span class="label">ที่อยู่ :</span>

${m.house_no} หมู่ ${m.moo}
${m.soi ?? ""}
${m.street ?? ""}
${m.subdistrict}
${m.district}
${m.province}
${m.postal_code}

</div>

</div>
`

}

function showError(msg){

document.getElementById("memberData").innerHTML =
`<div class="card error">${msg}</div>`

}

init()

</script>

</body>
</html>
