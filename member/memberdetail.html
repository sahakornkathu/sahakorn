<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Supabase Test</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:sans-serif;
background:#f3f4f6;
padding:40px;
}

.box{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
margin-top:10px;
padding:10px 15px;
background:#06c755;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
line-height:1.8;
}

.debug{
margin-top:20px;
background:black;
color:#0f0;
padding:10px;
font-size:12px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="box">

<h2>ทดสอบ Supabase Members</h2>

<input id="lineid" placeholder="ใส่ LINE USER ID">

<button onclick="searchMember()">ค้นหาสมาชิก</button>

<div class="result" id="result"></div>

<div class="debug" id="debug"></div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://ttottijljxoinptmhgtu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"
)

async function searchMember(){

const lineid = document.getElementById("lineid").value

debug("Searching : "+lineid)

const { data, error } = await supabase
.from("members")
.select("*")
.eq("line_user_id", lineid)

debug("Result : "+JSON.stringify(data))

if(error){

debug("ERROR : "+error.message)

return

}

if(!data || data.length == 0){

document.getElementById("result").innerHTML = "ไม่พบสมาชิก"

return

}

const m = data[0]

document.getElementById("result").innerHTML = `

<div>รหัสสมาชิก : ${m.member_id}</div>
<div>ชื่อ : ${m.title} ${m.first_name} ${m.last_name}</div>
<div>เลขบัตร : ${m.id_card}</div>
<div>เบอร์โทร : ${m.phone}</div>

`

}

function debug(msg){

document.getElementById("debug").innerHTML += "<br>"+msg

}

</script>

</body>
</html>
