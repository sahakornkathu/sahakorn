<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>LINE Mini App Member</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

.card{
max-width:520px;
margin:auto;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.profile{
text-align:center;
}

.profile img{
width:110px;
height:110px;
border-radius:50%;
}

.name{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.section{
margin-top:25px;
line-height:1.8;
}

.label{
font-weight:bold;
color:#444;
}

.debug{
margin-top:25px;
background:#111;
color:#0f0;
padding:12px;
font-size:12px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="card">

<div class="profile">

<img id="profilePic">

<div class="name" id="displayName">Loading...</div>

</div>

<div class="section" id="memberInfo">

กำลังโหลดข้อมูลสมาชิก...

</div>

<div class="debug" id="debugPanel">

DEBUG...

</div>

</div>

<script>

const LIFF_ID = "2009012101-mBy1yERI
"

const supabase = window.supabase.createClient(
"https://ttottijljxoinptmhgtu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"
)

async function main(){

await liff.init({ liffId: LIFF_ID })

if(!liff.isLoggedIn()){
liff.login()
return
}

const profile = await liff.getProfile()

const userId = profile.userId

document.getElementById("profilePic").src = profile.pictureUrl
document.getElementById("displayName").innerText = profile.displayName

debug("LINE USER ID : "+userId)

loadMember(userId)

}

async function loadMember(userId){

const { data, error } = await supabase
.from("members")
.select("*")
.eq("line_user_id", userId)

debug("SUPABASE RESULT : "+JSON.stringify(data))

if(error){

debug("SUPABASE ERROR : "+error.message)

document.getElementById("memberInfo").innerHTML =
"เกิดข้อผิดพลาดในการโหลดข้อมูล"

return

}

if(!data || data.length === 0){

document.getElementById("memberInfo").innerHTML =
"❌ ไม่พบสมาชิกที่เชื่อม LINE นี้"

return

}

const m = data[0]

document.getElementById("memberInfo").innerHTML = `

<div><span class="label">รหัสสมาชิก :</span> ${m.member_id}</div>

<div><span class="label">ชื่อ :</span> ${m.title} ${m.first_name} ${m.last_name}</div>

<div><span class="label">เลขบัตรประชาชน :</span> ${m.id_card}</div>

<div><span class="label">เบอร์โทร :</span> ${m.phone}</div>

<div><span class="label">สถานะสมาชิก :</span> ${m.member_status}</div>

<div><span class="label">กลุ่ม :</span> ${m.group}</div>

<div><span class="label">ที่อยู่ :</span>
${m.house_no} หมู่ ${m.moo}
${m.soi ?? ""}
${m.street ?? ""}
${m.subdistrict}
${m.district}
${m.province}
${m.postal_code}
</div>

`

debug("MATCH MEMBER ID : "+m.member_id)

}

function debug(msg){

const el = document.getElementById("debugPanel")

el.innerHTML += "<br>"+msg

console.log(msg)

}

main()

</script>

</body>
</html>
