<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<title>Member Mini App</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gray-100 p-4">

<div class="max-w-xl mx-auto">

<!-- Dashboard -->

<div class="bg-white rounded-xl p-4 shadow mb-4">

<h2 class="text-lg font-bold mb-2">
สวัสดี <span id="displayName">...</span>
</h2>

<div class="grid grid-cols-2 gap-2">

<button onclick="openProfile()"
class="bg-green-600 text-white p-3 rounded">
ข้อมูลสมาชิก
</button>

<button class="bg-gray-400 text-white p-3 rounded">
หุ้นของฉัน
</button>

<button class="bg-gray-400 text-white p-3 rounded">
ปันผล
</button>

<button class="bg-gray-400 text-white p-3 rounded">
ข่าวสหกรณ์
</button>

</div>

</div>

<!-- Profile -->

<div id="profileCard"
class="bg-white rounded-xl p-4 shadow hidden">

<h2 class="font-bold mb-3">ข้อมูลสมาชิก</h2>

<div class="space-y-1 mb-4">

<div>เลขสมาชิก : <span id="member_id"></span></div>
<div>ชื่อ : <span id="name"></span></div>
<div>กลุ่ม : <span id="group"></span></div>

</div>

<div class="grid grid-cols-2 gap-2">

<input id="house_no" disabled class="border p-2 rounded" placeholder="เลขที่บ้าน">
<input id="moo" disabled class="border p-2 rounded" placeholder="หมู่">

<input id="soi" disabled class="border p-2 rounded" placeholder="ซอย">
<input id="village" disabled class="border p-2 rounded" placeholder="หมู่บ้าน">

<input id="street" disabled class="border p-2 rounded" placeholder="ถนน">
<input id="subdistrict" disabled class="border p-2 rounded" placeholder="ตำบล">

<input id="district" disabled class="border p-2 rounded" placeholder="อำเภอ">
<input id="province" disabled class="border p-2 rounded" placeholder="จังหวัด">

<input id="postal_code" disabled class="border p-2 rounded" placeholder="รหัสไปรษณีย์">

</div>

<div class="mt-3">

<label class="text-sm">เบอร์โทร</label>

<input id="phone"
disabled
class="border p-2 w-full rounded">

</div>

<div class="mt-4 space-x-2">

<button id="editBtn"
onclick="edit()"
class="bg-blue-600 text-white px-4 py-2 rounded">
แก้ไข
</button>

<button id="saveBtn"
onclick="save()"
class="bg-green-600 text-white px-4 py-2 rounded hidden">
บันทึก
</button>

</div>

</div>

</div>

<script>

const supabase = supabase.createClient(
"https://ttottijljxoinptmhgtu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"
)

let memberId = null

async function init(){

console.log("INIT START")

let userId = null

try{

await liff.init({ liffId:"2009012101-mBy1yERI" })

console.log("LIFF READY")

if(!liff.isLoggedIn()){
 liff.login()
 return
}

const profile = await liff.getProfile()

document.getElementById("displayName").innerText = profile.displayName

userId = profile.userId

}catch(e){

console.log("LIFF ERROR",e)

}

/* DEV MODE สำหรับทดสอบในคอม */

if(!userId){

console.log("DEV MODE")

document.getElementById("displayName").innerText = "Developer"

userId = "Ue2ed0db8194447badd33601b50b91c28"

}

console.log("USERID:",userId)

loadMember(userId)

}

async function loadMember(userId){

const { data, error } = await supabase
.from("members")
.select("*")
.eq("line_user_id",userId)
.maybeSingle()

console.log("DATA:",data)
console.log("ERROR:",error)

if(!data){

alert("ไม่พบข้อมูลสมาชิก")

return

}

memberId = data.member_id

document.getElementById("member_id").innerText = data.member_id
document.getElementById("name").innerText = data.first_name+" "+data.last_name
document.getElementById("group").innerText = data.group

document.getElementById("house_no").value = data.house_no || ""
document.getElementById("moo").value = data.moo || ""
document.getElementById("soi").value = data.soi || ""
document.getElementById("village").value = data.village || ""
document.getElementById("street").value = data.street || ""
document.getElementById("subdistrict").value = data.subdistrict || ""
document.getElementById("district").value = data.district || ""
document.getElementById("province").value = data.province || ""
document.getElementById("postal_code").value = data.postal_code || ""

document.getElementById("phone").value = data.phone || ""

}

function openProfile(){

document.getElementById("profileCard").classList.remove("hidden")

}

function edit(){

const fields=[
"house_no","moo","soi","village",
"street","subdistrict","district",
"province","postal_code","phone"
]

fields.forEach(id=>{
 document.getElementById(id).disabled=false
})

document.getElementById("editBtn").classList.add("hidden")
document.getElementById("saveBtn").classList.remove("hidden")

}

async function save(){

await supabase
.from("members")
.update({

house_no:document.getElementById("house_no").value,
moo:document.getElementById("moo").value,
soi:document.getElementById("soi").value,
village:document.getElementById("village").value,
street:document.getElementById("street").value,
subdistrict:document.getElementById("subdistrict").value,
district:document.getElementById("district").value,
province:document.getElementById("province").value,
postal_code:document.getElementById("postal_code").value,
phone:document.getElementById("phone").value

})
.eq("member_id",memberId)

alert("บันทึกสำเร็จ")

location.reload()

}

init()

</script>

</body>
</html>
