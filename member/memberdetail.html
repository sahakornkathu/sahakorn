<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Supabase Member Test</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:sans-serif;
background:#f4f6f9;
padding:40px;
}

.box{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
margin-top:10px;
padding:10px 15px;
background:#06c755;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
line-height:1.8;
}

.debug{
margin-top:20px;
background:black;
color:#0f0;
padding:10px;
font-size:12px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="box">

<h2>ทดสอบ Supabase Members</h2>

<input id="lineid" placeholder="ใส่ LINE USER ID">

<button id="btnSearch">ค้นหาสมาชิก</button>

<div class="result" id="result"></div>

<div class="debug" id="debug"></div>

</div>

<script>

const SUPABASE_URL = "https://ttottijljxoinptmhgtu.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"

const sb = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

document.getElementById("btnSearch").addEventListener("click", searchMember)

async function searchMember(){

const lineid = document.getElementById("lineid").value.trim()

debug("Searching line_user_id : "+lineid)

if(!lineid){

alert("กรุณาใส่ LINE USER ID")

return

}

const { data, error } = await sb
.from("members")
.select("*")
.eq("line_user_id", lineid)

if(error){

debug("ERROR : "+error.message)

return

}

debug("RESULT : "+JSON.stringify(data))

if(!data || data.length === 0){

document.getElementById("result").innerHTML =
"<b>ไม่พบสมาชิก</b>"

return

}

const m = data[0]

document.getElementById("result").innerHTML =

`
<div><b>รหัสสมาชิก :</b> ${m.member_id}</div>
<div><b>ชื่อ :</b> ${m.title} ${m.first_name} ${m.last_name}</div>
<div><b>เลขบัตร :</b> ${m.id_card}</div>
<div><b>เบอร์โทร :</b> ${m.phone ?? "-"}</div>
<div><b>สถานะ :</b> ${m.member_status}</div>
`

}

function debug(msg){

const el = document.getElementById("debug")

el.innerHTML += "<br>"+msg

console.log(msg)

}

</script>

</body>
</html>
