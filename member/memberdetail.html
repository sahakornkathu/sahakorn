<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Member Profile</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:sans-serif;
background:#f3f4f6;
padding:30px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.profile{
text-align:center;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
}

.name{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.row{
margin-bottom:10px;
}

.label{
font-weight:bold;
color:#555;
}

input{
width:100%;
padding:8px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:10px;
padding:10px 14px;
border:none;
background:#06c755;
color:white;
border-radius:8px;
cursor:pointer;
}

.error{
color:red;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="card profile">
<img id="linePic">
<div class="name" id="lineName">Loading...</div>
</div>

<div id="memberData"></div>

</div>

<script>

const LIFF_ID = "1660910795-ZwhoBm8e"

const sb = window.supabase.createClient(
"https://ttottijljxoinptmhgtu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"
)

let member = null

async function init(){

await liff.init({ liffId: LIFF_ID })

if(!liff.isLoggedIn()){
liff.login()
return
}

const profile = await liff.getProfile()

document.getElementById("linePic").src = profile.pictureUrl
document.getElementById("lineName").innerText = profile.displayName

loadMember(profile.userId)

}

async function loadMember(userId){

const { data } = await sb
.from("members")
.select("*")
.eq("line_user_id", userId)

if(!data || data.length === 0){

showError("ไม่พบสมาชิก")

return
}

member = data[0]

renderView()

}

function renderView(){

document.getElementById("memberData").innerHTML = `

<div class="card">

<div class="row"><b>ชื่อ :</b> ${member.first_name} ${member.last_name}</div>

<div class="row"><b>เบอร์โทร :</b> ${member.phone ?? ""}</div>

<div class="row"><b>บ้านเลขที่ :</b> ${member.house_no ?? ""}</div>

<div class="row"><b>หมู่ :</b> ${member.moo ?? ""}</div>

<div class="row"><b>ตำบล :</b> ${member.subdistrict ?? ""}</div>

<div class="row"><b>อำเภอ :</b> ${member.district ?? ""}</div>

<div class="row"><b>จังหวัด :</b> ${member.province ?? ""}</div>

<button onclick="renderEdit()">แก้ไขข้อมูล</button>

</div>
`

}

function renderEdit(){

document.getElementById("memberData").innerHTML = `

<div class="card">

<div class="row">

<label>ชื่อ</label>

<input id="first_name" value="${member.first_name}">

</div>

<div class="row">

<label>นามสกุล</label>

<input id="last_name" value="${member.last_name}">

</div>

<div class="row">

<label>เบอร์โทร</label>

<input id="phone" value="${member.phone ?? ""}">

</div>

<div class="row">

<label>บ้านเลขที่</label>

<input id="house_no" value="${member.house_no ?? ""}">

</div>

<div class="row">

<label>หมู่</label>

<input id="moo" value="${member.moo ?? ""}">

</div>

<div class="row">

<label>ตำบล</label>

<input id="subdistrict" value="${member.subdistrict ?? ""}">

</div>

<div class="row">

<label>อำเภอ</label>

<input id="district" value="${member.district ?? ""}">

</div>

<div class="row">

<label>จังหวัด</label>

<input id="province" value="${member.province ?? ""}">

</div>

<button onclick="saveMember()">บันทึก</button>

<button onclick="renderView()">ยกเลิก</button>

</div>
`

}

async function saveMember(){

await sb
.from("members")
.update({

first_name:document.getElementById("first_name").value,
last_name:document.getElementById("last_name").value,
phone:document.getElementById("phone").value,
house_no:document.getElementById("house_no").value,
moo:document.getElementById("moo").value,
subdistrict:document.getElementById("subdistrict").value,
district:document.getElementById("district").value,
province:document.getElementById("province").value

})
.eq("member_id", member.member_id)

alert("บันทึกข้อมูลสำเร็จ")

loadMember(member.line_user_id)

}

function showError(msg){

document.getElementById("memberData").innerHTML =
`<div class="card error">${msg}</div>`

}

init()

</script>

</body>
</html>
