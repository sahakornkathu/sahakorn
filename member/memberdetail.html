<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ข้อมูลสมาชิก</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
:root{
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#222;
  --muted:#666;
  --line:#e9edf3;
  --primary:#06c755;
  --danger:#ff4d4f;
  --shadow:0 2px 10px rgba(0,0,0,0.08);
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
  padding:
    max(12px, env(safe-area-inset-top))
    12px
    max(12px, env(safe-area-inset-bottom))
    12px;
}

.container{
  max-width:480px;
  margin:auto;
}

/* top bar */
.topbar{
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
}

.icon-btn{
  border:none;
  border-radius:10px;
  padding:10px 12px;
  font-size:15px;
  cursor:pointer;
  background:#fff;
  box-shadow:var(--shadow);
  color:var(--text);
}

/* PROFILE HEADER */
.header{
  text-align:center;
  padding:26px 15px;
  background:linear-gradient(135deg,#06c755,#00a94f);
  color:white;
  border-radius:16px;
  margin-bottom:15px;
  position:relative;
  box-shadow:var(--shadow);
}

.header img{
  width:85px;
  height:85px;
  border-radius:50%;
  border:4px solid white;
  margin-bottom:8px;
  object-fit:cover;
}

.header h3{
  margin:0;
  font-size:20px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}

.card h3{
  margin:0 0 10px 0;
  font-size:16px;
}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:8px 0;
  font-size:14px;
  border-bottom:1px solid var(--line);
}

.row:last-child{
  border-bottom:none;
}

.row span:last-child{
  text-align:right;
  word-break:break-word;
}

/* BUTTON */
button{
  border:none;
  border-radius:10px;
  padding:12px;
  font-size:15px;
  cursor:pointer;
}

.primary{
  background:var(--primary);
  color:white;
  width:100%;
}

.danger{
  background:var(--danger);
  color:white;
  width:100%;
  margin-top:10px;
}

/* EDIT BUTTON */
.edit-btn{
  position:absolute;
  top:12px;
  right:12px;
  background:#ff9800;
  color:white;
  padding:8px 10px;
  font-size:13px;
}

/* INPUT */
input, select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:15px;
  margin-bottom:10px;
  background:#fff;
  color:var(--text);
}

input:focus, select:focus{
  outline:none;
  border-color:var(--primary);
}

/* TAB */
.tabs{
  display:flex;
  background:white;
  border-radius:12px;
  margin-bottom:14px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.tab{
  flex:1;
  text-align:center;
  padding:12px 8px;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  color:#222;
  background:#f5f5f5;
}

.tab.active{
  background:#06c755;
  color:#000;
}

.tab-content{
  display:none;
}

.tab-content.active{
  display:block;
}

/* FILTER */
.filter-box{
  margin-bottom:0;
}

.filter-box label{
  display:block;
  font-size:13px;
  margin-bottom:6px;
  color:var(--muted);
  font-weight:600;
}

.filter-select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  background:#fff;
  font-size:14px;
  font-weight:600;
  appearance:auto; 
}

/* info badge */
.env-box{
  font-size:12px;
  color:var(--muted);
  margin-bottom:10px;
  text-align:center;
}

/* DARK MODE */
html.dark{
  background:#121212;
  color:white;
}

html.dark body{
  background:#121212;
}

.dark .icon-btn,
.dark .card{
  background:#1e1e1e;
  color:#fff;
}

.dark input,
.dark select{
  background:#2b2b2b;
  color:white;
  border:1px solid #444;
}

.dark .tabs{
  background:#1e1e1e;
}

.dark .tab{
  background:#2a2a2a;
  color:#ddd;
}

.dark .tab.active{
  background:#06c755;
  color:#fff;
}

.dark .filter-box label{
  color:#bbb;
}

.dark .filter-select{
  background:#2b2b2b;
  color:white;
  border:1px solid #444;
}

html.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#ffffff;
  --muted:#bbbbbb;
  --line:#333;
}
  
html,body{
  margin:0;
  padding:0;
  min-height:100%;
  background:var(--bg);
}
</style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <button class="icon-btn" onclick="toggleDark()">🌙</button>
  </div>

  <div class="env-box" id="envBox"></div>

  <div id="app"></div>

</div>

<script>
const LIFF_ID="2009012101-mBy1yERI";

const sb = window.supabase.createClient(
  "https://ttottijljxoinptmhgtu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b3R0aWpsanhvaW5wdG1oZ3R1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTYxODQsImV4cCI6MjA3MzU5MjE4NH0.XnIf3xLzSbZDwFVKWjLTCiF4jnnDMQ1W95EI-v6F-3Y"
);

let userId;
let profile;
let member;

/* ================= UI SAFE ================= */

function showLoading(msg="กำลังโหลด..."){
  document.getElementById("app").innerHTML =
  `<div class="card" style="text-align:center">${msg}</div>`;
}

function showError(msg){
  document.getElementById("app").innerHTML =
  `<div class="card" style="color:red;text-align:center">
    ❌ ${msg}
    <br><br>
    <button class="primary" onclick="location.reload()">ลองใหม่</button>
  </div>`;
}

/* ================= THEME ================= */

function toggleDark(){
  document.documentElement.classList.toggle("dark");
  localStorage.setItem("theme",
    document.documentElement.classList.contains("dark")?"dark":"light"
  );
}

function loadTheme(){
  if(localStorage.getItem("theme")==="dark"){
    document.documentElement.classList.add("dark");
  }
}

/* ================= DATE ================= */

function thaiDate(date){
  if(!date) return "-";
  const d=new Date(date);
  return d.toLocaleDateString("th-TH",{year:"numeric",month:"long",day:"numeric"});
}

function calcAge(date){
  if(!date) return "-";
  const birth=new Date(date);
  const today=new Date();
  let age=today.getFullYear()-birth.getFullYear();
  if(today < new Date(birth.setFullYear(today.getFullYear()))) age--;
  return age;
}

/* ================= TAB ================= */

function openTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tabBtn_"+tab)?.classList.add("active");
  document.getElementById("tab_"+tab)?.classList.add("active");
}

/* ================= INIT ================= */

async function init(){

  showLoading("กำลังเชื่อมต่อ LINE...");

  try{

    try{
      await liff.init({ liffId: LIFF_ID });

      if(!liff.isLoggedIn()){
        liff.login();
        return;
      }

      profile = await liff.getProfile();
      userId = profile.userId;

    }catch(err){
      console.warn("LIFF FAIL → TEST MODE");
      userId="TEST_USER";
      profile={
        displayName:"Guest",
        pictureUrl:"https://via.placeholder.com/100"
      };
    }

    renderEnvInfo();

    showLoading("กำลังโหลดข้อมูลสมาชิก...");
    await checkBind();

  }catch(err){
    showError(err.message);
  }
}

function renderEnvInfo(){
  const el=document.getElementById("envBox");
  el.textContent = window.liff?.isInClient?.()
    ? "เปิดผ่าน LINE"
    : "Browser Test Mode";
}

/* ================= CHECK BIND ================= */

async function checkBind(){

  try{

    const {data,error}=await sb
      .from("members")
      .select("*")
      .eq("line_user_id",userId)
      .maybeSingle();

    if(error) throw error;

    if(data){
      member=data;
      showProfile();
    }else{
      showBindPage();
    }

  }catch(err){
    showError("โหลดสมาชิกไม่สำเร็จ: "+err.message);
  }
}

/* ================= BIND ================= */

function showBindPage(){
  document.getElementById("app").innerHTML=`
    <div class="card">
      <h3>ผูกบัญชี LINE</h3>
      <input id="idcard" placeholder="เลขบัตรประชาชน">
      <button class="primary" onclick="bind()">ผูกบัญชี</button>
    </div>
  `;
}

async function bind(){

  try{

    const idcard=document.getElementById("idcard").value;

    if(!idcard){
      alert("กรอกเลขบัตร");
      return;
    }

    showLoading("กำลังตรวจสอบ...");

    const {data,error}=await sb
      .from("members")
      .select("*")
      .eq("id_card",idcard)
      .maybeSingle();

    if(error) throw error;

    if(!data){
      showError("ไม่พบสมาชิก");
      return;
    }

    if(data.line_user_id){
      showError("ผูกแล้ว");
      return;
    }

    const {error:updateError}=await sb
      .from("members")
      .update({
        line_user_id:userId,
        line_display_name:profile.displayName,
        line_picture:profile.pictureUrl
      })
      .eq("id_card",idcard);

    if(updateError) throw updateError;

    await checkBind();

  }catch(err){
    showError("bind fail: "+err.message);
  }
}

/* ================= MEETING ================= */

async function loadMeeting(){
  try{
    const {data,error}=await sb
      .from("member_meeting")
      .select("*")
      .eq("member_id",member.member_id);

    if(error) throw error;

    if(!data || data.length===0) return "ไม่มีข้อมูล";

    return data.map(m=>`
      <div class="row">
        <span>${m.meeting_type}</span>
        <span>${thaiDate(m.meeting_date)}</span>
      </div>
    `).join("");

  }catch(err){
    return "โหลดไม่สำเร็จ";
  }
}

/* ================= SHARE ================= */

async function loadShare(){
  try{
    const {data,error}=await sb
      .from("member_share")
      .select("*")
      .eq("member_id",member.member_id);

    if(error) throw error;

    if(!data || data.length===0) return "ไม่มีข้อมูล";

    return data.map(s=>`
      <div class="row">
        <span>ปี ${s.fiscal_year}</span>
        <span>${s.share_balance}</span>
      </div>
    `).join("");

  }catch(err){
    return "โหลดไม่สำเร็จ";
  }
}

/* ================= PROFILE ================= */

async function showProfile(){

  showLoading("กำลังโหลดข้อมูล...");

  const meetingHTML = await loadMeeting();
  const shareHTML = await loadShare();

  document.getElementById("app").innerHTML=`
    <div class="header">
      <img src="${member?.line_picture || profile?.pictureUrl}">
      <h3>${profile?.displayName}</h3>
    </div>

    <div class="tabs">
      <div id="tabBtn_person" class="tab active" onclick="openTab('person')">ข้อมูล</div>
      <div id="tabBtn_meeting" class="tab" onclick="openTab('meeting')">ประชุม</div>
      <div id="tabBtn_share" class="tab" onclick="openTab('share')">หุ้น</div>
    </div>

    <div id="tab_person" class="tab-content active">
      <div class="card">
        <div class="row"><span>รหัส</span><span>${member.member_id}</span></div>
        <div class="row"><span>ชื่อ</span><span>${member.first_name}</span></div>
      </div>
    </div>

    <div id="tab_meeting" class="tab-content">
      <div class="card">${meetingHTML}</div>
    </div>

    <div id="tab_share" class="tab-content">
      <div class="card">${shareHTML}</div>
    </div>

    <button class="danger" onclick="unbind()">ยกเลิกผูก</button>
  `;
}

/* ================= UNBIND ================= */

async function unbind(){

  if(!confirm("ยืนยัน?")) return;

  try{

    showLoading("กำลังดำเนินการ...");

    const {error}=await sb
      .from("members")
      .update({line_user_id:null})
      .eq("line_user_id",userId);

    if(error) throw error;

    location.reload();

  }catch(err){
    showError(err.message);
  }
}

/* ================= START ================= */

loadTheme();
init();
</script>

</body>
</html>
