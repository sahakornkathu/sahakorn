<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>LINE Mini App Profile</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
font-family:sans-serif;
background:#f3f4f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:16px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:320px;
}

img{
width:120px;
height:120px;
border-radius:50%;
margin-bottom:15px;
}

.name{
font-size:22px;
font-weight:bold;
margin-bottom:5px;
}

.userid{
font-size:12px;
color:#666;
}

</style>

</head>

<body>

<div class="card">

<img id="profilePic">

<div class="name" id="displayName">Loading...</div>

<div class="userid" id="userId"></div>

</div>

<script>

async function main(){

await liff.init({
liffId:"2009012101-mBy1yERI"
})

if(!liff.isLoggedIn()){
liff.login()
return
}

const profile = await liff.getProfile()

document.getElementById("profilePic").src = profile.pictureUrl

document.getElementById("displayName").innerText = profile.displayName

document.getElementById("userId").innerText = profile.userId

}

main()

</script>

</body>
</html>
