async function init(){
  await liff.init({ liffId: LIFF_ID })

  if (!liff.isInClient()) {
    document.body.innerHTML =
      '<div class="text-center mt-20 text-xl">❌ กรุณาเปิดผ่าน LINE เท่านั้น</div>'
    return
  }

  if (!liff.isLoggedIn()) return liff.login()

  const profile = await liff.getProfile()

  const { data: admin } = await supabaseClient
    .from('adminmember')
    .select('position, approve_status')
    .eq('line_user_id', profile.userId)
    .maybeSingle()

  if (!admin || admin.approve_status !== 'approved') {
    alert('❌ ไม่มีสิทธิ์เข้าถึง')
    return
  }

  isSuperAdmin = admin.position === 'superadmin'
  adminGroup = isSuperAdmin ? null : admin.position.match(/\d+/)?.[0]

  initMap()
  loadMembers()

  // ⭐ เพิ่มตรงนี้
  setTimeout(()=>{
    goMyLocation()
  }, 800)
}

/* ================= MAP ================= */
function initMap(){
  map = L.map('map').setView([13.7,100.5],12)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)
}

function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m))
  markers = []

  allMembers.forEach(m=>{
    if(m.lat && m.lng){
      markers.push(
        L.marker([m.lat,m.lng])
          .addTo(map)
          .bindPopup(`${m.member_id}<br>${m.first_name} ${m.last_name}`)
      )
    }
  })
}

/* ================= LOAD MEMBERS ================= */
async function loadMembers(){
  allMembers = []
  let from = 0
  const STEP = 1000
  let finished = false

  while (!finished) {
    let q = supabaseClient
      .from('members')
    .select(`
  member_id,
  title,
  first_name,
  last_name,
  group,
  house_no,
  moo,
  village,
  soi,
  street,
  subdistrict,
  district,
  province,
  phone,
  member_status,
  lat,
  lng
`)
      .in('member_status', ['สมาชิก','สมาชิกสมทบ'])
      .order('member_id', { ascending: true })
      .range(from, from + STEP - 1)

    if (!isSuperAdmin) {
      q = q.eq('group', adminGroup)
    }

    const { data, error } = await q
    if (error) {
      alert(error.message)
      return
    }

    if (!data || data.length === 0) {
      finished = true
    } else {
      allMembers = allMembers.concat(data)
      from += STEP
    }
  }

  updateSummary()
  renderMarkers()
  resetAndRender()
}
// ปุ่มกดmylocation
function goMyLocation(){

  if (!navigator.geolocation) {
    Swal.fire('ผิดพลาด','อุปกรณ์ไม่รองรับ GPS','error')
    return
  }

  Swal.fire({
  title: 'กำลังค้นหาตำแหน่ง...',
  text: 'กรุณาอนุญาต GPS',
  background: '#020617',
  color: '#e2e8f0',
  allowOutsideClick: false,
  showConfirmButton: false,
  showClass: {
    popup: 'animate__animated animate__fadeInDown'
  },
  hideClass: {
    popup: 'animate__animated animate__fadeOutUp'
  },
  didOpen: () => {
    Swal.showLoading()
  }
})


  navigator.geolocation.getCurrentPosition(
    pos => {

      const lat = pos.coords.latitude
      const lng = pos.coords.longitude

      Swal.close()

      // เลื่อน map ไปตำแหน่งเรา
      map.setView([lat, lng], 17)

      // ปัก marker ชั่วคราว
      const myMarker = L.marker([lat, lng])
        .addTo(map)
        .bindPopup('📍 ตำแหน่งของฉัน')
        .openPopup()

      // ลบ marker อัตโนมัติ 10 วินาที
      setTimeout(()=>{
        map.removeLayer(myMarker)
      },10000)

    },
    () => {
      Swal.fire('ผิดพลาด','ไม่สามารถดึงตำแหน่งได้','error')
    }
  )
}

          ${m.lat&&m.lng?'📍 ปักแล้ว':'❌ ยังไม่ปัก'}
        </span>
      </div>

<div class="text-sm text-slate-400">
📍 ${m.house_no||'-'} ม.${m.moo||'-'} หมู่บ้าน${m.village||'-'} ซ.${m.soi||'-'} ถ.${m.street||'-'} ต.${m.subdistrict||'-'} อ.${m.district||'-'} จ.${m.province||'-'}
</div>

      </button>

      ${m.lat&&m.lng ? `
      <a href="https://www.google.com/maps/dir/?api=1&destination=${m.lat},${m.lng}"
        target="_blank"

  async function refreshMembers(){
  const btn = document.getElementById('refreshBtn')
  btn.disabled = true
  btn.innerHTML = '⏳ กำลังโหลดข้อมูล...'

  try {
    await loadMembers()   // 🔥 ตัวเดียวที่ต้องเรียก
    Swal.fire({
      toast: true,
      position: 'top',
      icon: 'success',
      title: 'อัปเดตข้อมูลล่าสุดแล้ว',
      showConfirmButton: false,
      timer: 1500
    })
  } catch (e) {
    Swal.fire('ผิดพลาด', 'โหลดข้อมูลไม่สำเร็จ', 'error')
  }

  btn.disabled = false
  btn.innerHTML = '🔄 รีเฟรชข้อมูลจากฐานข้อมูล'
}

let qrScanner

function openScanner(){

  const modal = document.getElementById('scanModal')
  modal.classList.remove('hidden')

  setTimeout(()=>{

    qrScanner = new Html5Qrcode("qr-reader")

    qrScanner.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      },

      (decodedText) => {

        document.getElementById('searchInput').value = decodedText

        resetAndRender()

        stopScanner()

        Swal.fire({
          icon:'success',
          title:'สแกนสำเร็จ',
          text:'สมาชิก '+decodedText,
          timer:1200,
          showConfirmButton:false
        })

      }

    ).catch(err=>{
      console.log(err)
      Swal.fire('ผิดพลาด','เปิดกล้องไม่ได้','error')
    })

  },300)

}

function stopScanner(){

  const modal = document.getElementById('scanModal')
  modal.classList.add('hidden')

  if(qrScanner){

    qrScanner.stop()
    .then(()=>{
      qrScanner.clear()
      qrScanner = null
    })
    .catch(()=>{})

  }
}
